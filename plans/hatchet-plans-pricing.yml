specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Hatchet
providerId: hatchet
created: '2026-05-04'
modified: '2026-05-25'
tags:
  - Task Queue
  - Workflow Engine
  - Durable Execution
  - Background Tasks
description: >-
  Plans and pricing for Hatchet Cloud, the managed orchestration service for
  background tasks, AI agents, and durable workflows. Reflects published tiers
  on hatchet.run/pricing (Developer, Team, Scale, Enterprise). Hatchet itself
  remains MIT-licensed and free to self-host on PostgreSQL.
plans:
  - id: hatchet-developer
    name: Developer
    type: freemium
    description: >-
      Free entry tier for individual developers getting started with Hatchet
      Cloud. Includes the first 100,000 task runs per month free; usage past
      that is billed at the published per-run rate. SOC 2 Type II controls
      apply to the underlying platform.
    entries:
      - label: Included Task Runs
        description: First 100,000 task runs per month included at no cost.
        name: included_task_runs
        type: quota
        metric: task_runs
        limit: 100000
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Task Run Overage
        description: Per-million-task-run price after the 100K monthly allowance.
        name: task_run_overage
        type: metered
        metric: task_runs
        limit: -1
        timeFrame: month
        geo: global
        domains: []
        unit: 1000000
        price: '10.00'
        userMultiplied: false
    elements:
      - name: Hatchet API
      - name: Python / TypeScript / Go / Ruby SDKs
      - name: Hatchet Cloud Dashboard
      - name: Community Support (Discord)
      - name: SOC 2 Type II Platform Controls
  - id: hatchet-team
    name: Team
    type: paid
    description: >-
      Production tier for teams shipping Hatchet-backed workflows. Includes
      10 users, 5 tenants, 3-day data retention, and up to 500 RPS throughput.
      Base fee plus metered task-run usage.
    entries:
      - label: Base Subscription
        description: Monthly base fee for the Team tier.
        name: base_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '500.00'
        userMultiplied: false
      - label: Included Users
        description: Number of seats included in the Team plan.
        name: included_users
        type: quota
        metric: users
        limit: 10
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Tenants
        description: Maximum logical tenants under one Team account.
        name: tenants
        type: quota
        metric: tenants
        limit: 5
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Throughput
        description: Sustained request-per-second ceiling for the Team tier.
        name: throughput
        type: rate
        metric: requests_per_second
        limit: 500
        timeFrame: second
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Data Retention
        description: Number of days task and workflow run history is retained.
        name: data_retention
        type: quota
        metric: days
        limit: 3
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Everything in Developer
      - name: Team Collaboration
      - name: 500 RPS Throughput
      - name: 3-Day Retention
      - name: Email Support
      - name: Hatchet API
  - id: hatchet-scale
    name: Scale
    type: paid
    description: >-
      Tier for mission-critical deployments. Adds unlimited users and tenants,
      7-day retention, audit logs, and HIPAA compliance posture for regulated
      AI and workflow workloads.
    entries:
      - label: Base Subscription
        description: Monthly base fee for the Scale tier.
        name: base_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '1000.00'
        userMultiplied: false
      - label: Users
        description: No seat cap on the Scale tier.
        name: users
        type: quota
        metric: users
        limit: -1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Tenants
        description: No tenant cap on the Scale tier.
        name: tenants
        type: quota
        metric: tenants
        limit: -1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Data Retention
        description: Number of days task and workflow run history is retained.
        name: data_retention
        type: quota
        metric: days
        limit: 7
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Everything in Team
      - name: Unlimited Users
      - name: Unlimited Tenants
      - name: 7-Day Retention
      - name: Audit Logs
      - name: HIPAA Compliance Posture
      - name: Hatchet API
  - id: hatchet-enterprise
    name: Enterprise
    type: enterprise
    description: >-
      Custom-negotiated tier for large organizations requiring SSO/SAML,
      dedicated support, custom SLAs, bring-your-own-cloud deployment, and
      sustained capacity of 300M+ task runs per month with latency guarantees.
    entries:
      - label: Base Subscription
        description: Custom-negotiated subscription pricing.
        name: base_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: configurable
        domains: []
        unit: 1
        price: custom
        userMultiplied: false
      - label: Task Run Capacity
        description: Sustained monthly task-run capacity baseline (300M+ documented).
        name: task_run_capacity
        type: quota
        metric: task_runs
        limit: 300000000
        timeFrame: month
        geo: configurable
        domains: []
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Everything in Scale
      - name: SSO / SAML
      - name: Custom SLAs
      - name: Dedicated Support
      - name: Bring-Your-Own-Cloud Deployment
      - name: 300M+ Runs / Month
      - name: Latency Guarantees
      - name: Hatchet API
  - id: hatchet-self-hosted
    name: Self-Hosted (Open Source)
    type: freemium
    description: >-
      The Hatchet engine, API, and dashboard are MIT-licensed and free to
      self-host on Postgres via Docker Compose, Hatchet Lite, or the official
      Helm chart. No managed-service fees apply; infrastructure costs are the
      operator's responsibility.
    entries:
      - label: License Fee
        description: Hatchet is MIT-licensed; there is no license fee for self-hosting.
        name: license_fee
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Hatchet API
      - name: Hatchet Engine (gRPC)
      - name: Hatchet Dashboard
      - name: Helm Chart
      - name: Docker Compose Quickstart
      - name: Hatchet Lite (single-image)
      - name: Community Support
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
