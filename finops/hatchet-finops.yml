specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Hatchet
providerId: hatchet
publisherName: Hatchet
serviceCategory: Developer Tools / Orchestration
created: '2026-05-04'
modified: '2026-05-25'
tags:
  - Task Queue
  - Workflow Engine
  - Durable Execution
  - Background Tasks
  - FinOps
  - Cost Management
  - FOCUS
description: >-
  FinOps framework definition for Hatchet Cloud, the managed orchestration
  service for background tasks, AI agents, and durable workflows. The
  primary billable unit is the task run; Hatchet Cloud meters task runs per
  month against an included allowance per plan (e.g. 100K runs free on the
  Developer tier, with $10 per additional million). Self-hosted Hatchet
  deployments have no Hatchet-side billable surface; cost lives in the
  underlying Postgres, compute, and (optional) RabbitMQ infrastructure.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Hatchet Cloud
  ServiceCategory: Developer Tools / Orchestration
  ProviderName: Hatchet
  PublisherName: Hatchet
  InvoiceIssuerName: Hatchet
  PricingCategory: Usage-Based
  PricingUnit: task-run
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: task_runs
    description: >-
      Count of executed task runs. Hatchet Cloud's primary billable unit.
      A task run is one invocation of a registered task, including durable
      workflow steps and AI agent tool calls.
    unit: task_run
    aggregation: sum
    dimensions:
      - tenant
      - workflow
      - task
      - tier
      - environment
      - consumer
  - name: workflow_runs
    description: >-
      Count of top-level workflow run instances, useful for tracking
      orchestration density independent of fan-out.
    unit: workflow_run
    aggregation: sum
    dimensions:
      - tenant
      - workflow
      - tier
  - name: active_workers
    description: >-
      Concurrent worker processes connected to the orchestration engine.
      Workers run on customer infrastructure; this meter tracks concurrency,
      not Hatchet-side compute.
    unit: worker
    aggregation: max
    dimensions:
      - tenant
      - workflow
      - region
  - name: retained_history_days
    description: >-
      Number of days of task and workflow run history retained. Plans cap
      retention at 3 (Team) or 7 (Scale) days; Enterprise can negotiate
      longer windows.
    unit: day
    aggregation: max
    dimensions:
      - tenant
      - tier
apis:
  - name: Hatchet API
    baseURL: ''
    tags:
      - Task Queue
      - Workflow Engine
      - Durable Execution
      - Background Tasks
    serviceName: Hatchet API
    serviceCategory: Developer Tools / Orchestration
unitEconomics:
  - name: Cost per Million Task Runs
    metric: billed_cost / (task_runs / 1000000)
    target: '10.00 USD (Developer overage benchmark)'
  - name: Cost per Workflow Run
    metric: billed_cost / workflow_runs
    target: TBD
  - name: Subscription Coverage Ratio
    metric: (included_task_runs - overage_task_runs) / included_task_runs
    target: '>= 0.85 (signals the right plan is selected)'
  - name: Self-Hosting Break-Even
    metric: hatchet_cloud_monthly_spend / (postgres_infra_cost + ops_overhead)
    target: '>= 1.0 (when ratio exceeds 1, self-hosting becomes cheaper)'
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
