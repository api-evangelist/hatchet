name: hatchet-events-and-filters
description: >-
  Publish events into Hatchet and bind them to workflows via CEL filters.
  This is the event-driven entry point: external systems push events, and
  Hatchet fans them out to subscribed workflows based on key + CEL filter
  predicates.
provider: hatchet
api: hatchet-api
operations:
  - id: createEvent
    method: POST
    path: /api/v1/stable/tenants/{tenant}/events
    description: Publish an event with a key, JSON data payload, and optional additional metadata.
  - id: listEvents
    method: GET
    path: /api/v1/stable/tenants/{tenant}/events
    description: List events for a tenant, filtered by key, time range, and metadata.
  - id: getEvent
    method: GET
    path: /api/v1/stable/tenants/{tenant}/events/{v1-event}
    description: Fetch a single event by ID with its payload and downstream workflow runs.
  - id: listEventKeys
    method: GET
    path: /api/v1/stable/tenants/{tenant}/events/keys
    description: List the distinct event keys observed for a tenant.
  - id: createFilter
    method: POST
    path: /api/v1/stable/tenants/{tenant}/filters
    description: Create a CEL filter that binds incoming events to a workflow with optional payload overrides.
  - id: listFilters
    method: GET
    path: /api/v1/stable/tenants/{tenant}/filters
    description: List filters for a tenant.
  - id: updateFilter
    method: PATCH
    path: /api/v1/stable/tenants/{tenant}/filters/{filter}
    description: Update a filter's expression, scope, or payload.
  - id: deleteFilter
    method: DELETE
    path: /api/v1/stable/tenants/{tenant}/filters/{filter}
    description: Remove a filter; events matching its key will no longer trigger its workflow.
