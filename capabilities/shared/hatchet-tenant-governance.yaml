name: hatchet-tenant-governance
description: >-
  Manage Hatchet tenants, API tokens, workers, webhook workers, and engine-level
  rate limits. This is the control-plane surface used to provision isolated
  environments, mint credentials, and govern throughput.
provider: hatchet
api: hatchet-api
operations:
  - id: listTenants
    method: GET
    path: /api/v1/tenants
    description: List tenants accessible to the authenticated user.
  - id: createTenant
    method: POST
    path: /api/v1/tenants
    description: Create a new tenant for isolating workflows, tasks, workers, and tokens.
  - id: getTenant
    method: GET
    path: /api/v1/tenants/{tenant}
    description: Fetch tenant metadata, settings, and quotas.
  - id: createAPIToken
    method: POST
    path: /api/v1/tenants/{tenant}/api-tokens
    description: Mint a bearer token scoped to the tenant for SDK and REST API access.
  - id: listAPITokens
    method: GET
    path: /api/v1/tenants/{tenant}/api-tokens
    description: List API tokens issued for a tenant.
  - id: revokeAPIToken
    method: DELETE
    path: /api/v1/tenants/{tenant}/api-tokens/{api-token}
    description: Revoke a previously issued API token.
  - id: listWorkers
    method: GET
    path: /api/v1/tenants/{tenant}/workers
    description: List active workers connected to the engine, with concurrency and heartbeat info.
  - id: getWorker
    method: GET
    path: /api/v1/tenants/{tenant}/workers/{worker}
    description: Fetch a single worker's details including capabilities and current load.
  - id: createWebhookWorker
    method: POST
    path: /api/v1/tenants/{tenant}/webhook-workers
    description: Register an external HTTPS endpoint as a webhook-based worker.
  - id: upsertRateLimit
    method: PUT
    path: /api/v1/tenants/{tenant}/rate-limits
    description: Define or update a named engine-level rate limit (units per duration window).
  - id: listRateLimits
    method: GET
    path: /api/v1/tenants/{tenant}/rate-limits
    description: List the engine-level rate limits configured for a tenant.
