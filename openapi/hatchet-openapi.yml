openapi: 3.1.0
info:
  version: 1.0.0
  title: Hatchet API
  description: The Hatchet API
servers:
- url: ''
security:
- bearerAuth: []
- cookieAuth: []
paths:
  /api/v1/stable/tasks/{task}:
    get:
      x-resources:
      - tenant
      - task
      description: Get a task by id
      operationId: v1-task:get
      parameters:
      - description: The task id
        in: path
        name: task
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      - description: The attempt number
        in: query
        name: attempt
        required: false
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1TaskSummary'
          description: Successfully retrieved the task
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: A malformed or bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: The task was not found
        '501':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Not implemented
      summary: Get a Task
      tags:
      - Task
  /api/v1/stable/tasks/{task}/task-events:
    get:
      x-resources:
      - tenant
      - task
      description: List events for a task
      operationId: v1-task-event:list
      parameters:
      - description: The task id
        in: path
        name: task
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      - description: The number to skip
        in: query
        name: offset
        required: false
        schema:
          type: integer
          format: int64
      - description: The number to limit by
        in: query
        name: limit
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1TaskEventList'
          description: Successfully retrieved the events
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: A malformed or bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: The task was not found
        '501':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Not implemented
      summary: List Events for a Task
      tags:
      - Task
  /api/v1/stable/tasks/{task}/logs:
    get:
      x-resources:
      - tenant
      - task
      description: Lists log lines for a task
      operationId: v1-log-line:list
      parameters:
      - description: The task id
        in: path
        name: task
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      - description: The number to limit by
        in: query
        name: limit
        required: false
        schema:
          type: integer
          format: int64
      - description: The start time to get logs for
        in: query
        name: since
        required: false
        schema:
          type: string
          format: date-time
      - description: The end time to get logs for
        in: query
        name: until
        required: false
        schema:
          type: string
          format: date-time
      - description: A full-text search query to filter for
        in: query
        name: search
        required: false
        schema:
          type: string
      - description: The log level(s) to include
        in: query
        name: levels
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/V1LogLineLevel'
      - description: The direction to order by
        in: query
        name: order_by_direction
        required: false
        schema:
          $ref: '#/components/schemas/V1LogLineOrderByDirection'
      - description: The attempt number to filter for
        in: query
        name: attempt
        required: false
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1LogLineList'
          description: Successfully listed the events
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: A malformed or bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Forbidden
      summary: List Log Lines
      tags:
      - Log
  /api/v1/stable/tenants/{tenant}/tasks/cancel:
    post:
      x-resources:
      - tenant
      description: Cancel tasks
      operationId: v1-task:cancel
      parameters:
      - description: The tenant id
        in: path
        name: tenant
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/V1CancelTaskRequest'
        description: The tasks to cancel
        required: true
      responses:
        '200':
          description: Successfully cancelled the tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1CancelledTasks'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: A malformed or bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: The task was not found
        '501':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Not implemented
      summary: Cancel Tasks
      tags:
      - Task
  /api/v1/stable/tenants/{tenant}/logs:
    get:
      x-resources:
      - tenant
      description: Lists log lines for a tenant
      operationId: v1-tenant-log-line:list
      parameters:
      - description: The tenant id
        in: path
        name: tenant
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      - description: The number to limit by
        in: query
        name: limit
        required: false
        schema:
          type: integer
          format: int64
      - description: The start time to get logs for
        in: query
        name: since
        required: false
        schema:
          type: string
          format: date-time
      - description: The end time to get logs for
        in: query
        name: until
        required: false
        schema:
          type: string
          format: date-time
      - description: A full-text search query to filter for
        in: query
        name: search
        required: false
        schema:
          type: string
      - description: The log level(s) to include
        in: query
        name: levels
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/V1LogLineLevel'
      - description: The direction to order by
        in: query
        name: order_by_direction
        required: false
        schema:
          $ref: '#/components/schemas/V1LogLineOrderByDirection'
      - description: The attempt number to filter for
        in: query
        name: attempt
        required: false
        schema:
          type: integer
      - description: The task external ID(s) to filter by
        in: query
        name: taskExternalIds
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
      - description: The workflow id(s) to filter for
        in: query
        name: workflow_ids
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
      - description: The step id(s) to filter for
        in: query
        name: step_ids
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1LogLineList'
          description: Successfully listed the logs
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: A malformed or bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Forbidden
      summary: List Log Lines
      tags:
      - Log
  /api/v1/stable/tenants/{tenant}/log-point-metrics:
    get:
      x-resources:
      - tenant
      description: Get a minute by minute breakdown of log metrics for a tenant
      operationId: v1-tenant-log-line:get:point-metrics
      parameters:
      - description: The tenant id
        in: path
        name: tenant
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      - description: The start time to get logs for
        in: query
        name: since
        required: false
        schema:
          type: string
          format: date-time
      - description: The end time to get logs for
        in: query
        name: until
        required: false
        schema:
          type: string
          format: date-time
      - description: A full-text search query to filter for
        in: query
        name: search
        required: false
        schema:
          type: string
      - description: The log level(s) to include
        in: query
        name: levels
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/V1LogLineLevel'
      - description: The task external ID(s) to filter by
        in: query
        name: taskExternalIds
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
      - description: The workflow id(s) to filter for
        in: query
        name: workflow_ids
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
      - description: The step id(s) to filter for
        in: query
        name: step_ids
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1LogsPointMetrics'
          description: Successfully retrieved the log point metrics
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: A malformed or bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Forbidden
        '501':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Not implemented
      summary: Get Log Point Metrics
      tags:
      - Log
  /api/v1/stable/tenants/{tenant}/tasks/replay:
    post:
      x-resources:
      - tenant
      description: Replay tasks
      operationId: v1-task:replay
      parameters:
      - description: The tenant id
        in: path
        name: tenant
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/V1ReplayTaskRequest'
        description: The tasks to replay
        required: true
      responses:
        '200':
          description: Successfully replayed the tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1ReplayedTasks'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: A malformed or bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: The task was not found
        '501':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Not implemented
      summary: Replay Tasks
      tags:
      - Task
  /api/v1/stable/tasks/{task}/restore:
    post:
      x-resources:
      - tenant
      - task
      description: Restore an evicted durable task
      operationId: v1-task:restore
      parameters:
      - description: The task id
        in: path
        name: task
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1RestoreTaskResponse'
          description: Successfully restored the task
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: A malformed or bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: The task was not found
      summary: Restore a Task
      tags:
      - Task
  /api/v1/stable/dags/tasks:
    get:
      description: Lists all tasks that belong a specific list of dags
      operationId: v1-dag:list:tasks
      parameters:
      - description: The external id of the DAG
        in: query
        name: dag_ids
        required: true
        schema:
          type: array
          items:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
      - description: The tenant id
        in: query
        name: tenant
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/V1DagChildren'
                description: The list of tasks
          description: Successfully listed the tasks
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: A malformed or bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Forbidden
        '501':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Not implemented
      summary: List Tasks
      tags:
      - Task
  /api/v1/stable/tenants/{tenant}/workflow-runs:
    get:
      x-resources:
      - tenant
      description: Lists workflow runs for a tenant.
      operationId: v1-workflow-run:list
      parameters:
      - description: The tenant id
        in: path
        name: tenant
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      - description: The number to skip
        in: query
        name: offset
        required: false
        schema:
          type: integer
          format: int64
      - description: The number to limit by
        in: query
        name: limit
        required: false
        schema:
          type: integer
          format: int64
      - description: A list of statuses to filter by
        in: query
        name: statuses
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/V1TaskStatus'
      - description: The earliest date to filter by
        in: query
        name: since
        required: true
        schema:
          type: string
          format: date-time
      - description: The latest date to filter by
        in: query
        name: until
        required: false
        schema:
          type: string
          format: date-time
      - description: Additional metadata k-v pairs to filter by
        in: query
        name: additional_metadata
        required: false
        schema:
          type: array
          items:
            type: string
      - description: The workflow ids to find runs for
        in: query
        name: workflow_ids
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
      - description: The worker id to filter by
        in: query
        name: worker_id
        required: false
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      - description: Whether to include DAGs or only to include tasks
        in: query
        name: only_tasks
        required: true
        schema:
          type: boolean
      - description: The parent task external id to filter by
        in: query
        name: parent_task_external_id
        required: false
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      - description: The external id of the event that triggered the workflow run
        in: query
        name: triggering_event_external_id
        required: false
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      - description: A flag for whether or not to include the input and output payloads in the response. Defaults to `true` if unset.
        in: query
        name: include_payloads
        required: false
        schema:
          type: boolean
      - description: Filter within the RUNNING status bucket. ALL returns both on-worker and evicted tasks, ON_WORKER returns only tasks running on a worker, EVICTED returns only evicted tasks. Defaults to ALL.
        in: query
        name: running_filter
        required: false
        schema:
          $ref: '#/components/schemas/V1RunningFilter'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1TaskSummaryList'
          description: Successfully listed the tasks
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: A malformed or bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Forbidden
        '501':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Not implemented
      summary: List Workflow Runs
      tags:
      - Workflow Runs
  /api/v1/stable/tenants/{tenant}/workflow-runs/display-names:
    get:
      x-resources:
      - tenant
      description: Lists displayable names of workflow runs for a tenant
      operationId: v1-workflow-run:display-names:list
      parameters:
      - description: The tenant id
        in: path
        name: tenant
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      - description: The external ids of the workflow runs to get display names for
        in: query
        name: external_ids
        required: true
        schema:
          type: array
          items:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1WorkflowRunDisplayNameList'
          description: Successfully listed the tasks
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: A malformed or bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Forbidden
        '501':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Not implemented
      summary: List Workflow Runs
      tags:
      - Workflow Runs
  /api/v1/stable/tenants/{tenant}/workflow-runs/external-ids:
    get:
      x-resources:
      - tenant
      description: Lists external ids for workflow runs matching filters
      operationId: v1-workflow-run:external-ids:list
      parameters:
      - description: The tenant id
        in: path
        name: tenant
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      - description: A list of statuses to filter by
        in: query
        name: statuses
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/V1TaskStatus'
      - description: The earliest date to filter by
        in: query
        name: since
        required: true
        schema:
          type: string
          format: date-time
      - description: The latest date to filter by
        in: query
        name: until
        required: false
        schema:
          type: string
          format: date-time
      - description: Additional metadata k-v pairs to filter by
        in: query
        name: additional_metadata
        required: false
        schema:
          type: array
          items:
            type: string
      - description: The workflow ids to find runs for
        in: query
        name: workflow_ids
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
      - description: Filter within the RUNNING status bucket. ALL returns both on-worker and evicted tasks, ON_WORKER returns only tasks running on a worker, EVICTED returns only evicted tasks. Defaults to ALL.
        in: query
        name: running_filter
        required: false
        schema:
          $ref: '#/components/schemas/V1RunningFilter'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1WorkflowRunExternalIdList'
          description: Successfully listed the tasks
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: A malformed or bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Forbidden
        '501':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Not implemented
      summary: List Workflow Run External Ids
      tags:
      - Workflow Runs
  /api/v1/stable/tenants/{tenant}/workflow-runs/trigger:
    post:
      x-resources:
      - tenant
      description: Trigger a new workflow run
      operationId: v1-workflow-run:create
      parameters:
      - description: The tenant id
        in: path
        name: tenant
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/V1TriggerWorkflowRunRequest'
        description: The workflow run to create
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1WorkflowRunDetails'
          description: Successfully created the workflow run
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: A malformed or bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Forbidden
      summary: Create Workflow Run
      tags:
      - Workflow Runs
  /api/v1/stable/tenants/{tenant}/durable-tasks/branch:
    post:
      x-resources:
      - tenant
      description: Branch a durable task from a specific node, creating a new branch and re-processing its matches.
      operationId: v1-durable-task:branch
      parameters:
      - description: The tenant id
        in: path
        name: tenant
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/V1BranchDurableTaskRequest'
        description: The branch request
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1BranchDurableTaskResponse'
          description: Successfully branch the durable task
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: A malformed or bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrors'
          description: Forbidden
      summary: Branch Durable Task
      tags:
      - Workflow Runs
  /api/v1/stable/durable-tasks/{durable-task}:
    get:
      x-resources:
      - durable-task
      description: Lists all event log entries for a durable task.
